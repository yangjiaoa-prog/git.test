name: 文档质量检查

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 1. Markdown 格式检查（标题空行、语法）
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 markdownlint
        run: npm install -g markdownlint-cli
      - name: 检查格式
        run: markdownlint '**/*.md' --ignore-node-modules

  # 2. 错别字检查（最强！soluton 必查出来）
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检查英文拼写错误
        uses: codespell-project/actions-codespell@v2
        with:
          path: "."
          skip: .git,*.png,*.jpg,*.svg
          ignore_words_list: aka,repo,github,actions,yml,md

  # 3. 死链检查（链接是否有效）
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检查所有链接
        uses: lycheeverse/lychee-action@v1
        with:
          args: '**/*.md'
          fail: true
