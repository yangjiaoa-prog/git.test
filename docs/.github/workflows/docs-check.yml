name: 文档质量检查（Markdown+内容+链接）

# 触发时机：推送到 main 分支，或向 main 发 PR
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 任务开始
jobs:
  # 任务1：检查 Markdown 格式
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装格式检查工具
        run: npm install -g markdownlint-cli

      - name: 运行格式检查
        run: markdownlint '**/*.md'

  # 任务2：检查内容风格（术语、语法、语气）
  vale:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 运行内容检查
        uses: errata-ai/vale-action@v2
        with:
          files: '**/*.md'

  # 任务3：检查死链（链接是否有效）
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 检查所有链接
        uses: lycheeverse/lychee-action@v1
        with:
          args: '**/*.md'
          fail: true
